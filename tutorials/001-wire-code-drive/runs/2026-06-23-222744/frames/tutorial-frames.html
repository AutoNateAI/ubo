<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UBO Car Drive Tutorial Frames</title>
  <style>
    :root {
      --app-bg: #f4f1e8;
      --app-ink: #232525;
      --app-muted: #686357;
      --app-line: #c8c1b2;
      --app-panel: #fffdf8;
      --app-green: #60733d;
      --app-green-soft: #dcebc1;
      --editor-bg: #111417;
      --editor-panel: #20252b;
      --editor-panel-2: #242a31;
      --editor-line: #343b44;
      --editor-text: #d8dee6;
      --editor-muted: #9ca6b0;
      --editor-blue: #127fc1;
      --grid-line: rgba(255,255,255,0.045);
      --wire-red: #ef4444;
      --wire-green: #22c55e;
      --wire-yellow: #facc15;
      --wire-orange: #f97316;
      --wire-black: #05070a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--app-bg);
      color: var(--app-ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      width: 1440px;
      height: 900px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(84,69,42,0.045) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(180deg, #fbf8ef 0%, #eee7db 100%);
    }

    .topBar {
      height: 72px;
      display: grid;
      grid-template-columns: 270px 1fr 270px;
      align-items: center;
      gap: 18px;
      padding: 0 56px;
      border-bottom: 1px solid rgba(92,82,63,0.2);
      background: rgba(255,253,247,0.86);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 20px;
    }

    .brandMark {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 2px solid #2d3030;
      position: relative;
    }

    .brandMark::before,
    .brandMark::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      border: 2px solid #2d3030;
      border-radius: 50%;
      background: var(--app-panel);
    }

    .brandMark::before {
      left: -5px;
      top: 5px;
    }

    .brandMark::after {
      right: -5px;
      bottom: 5px;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 9px;
    }

    .nav button,
    .topActions button,
    .stageButton {
      min-height: 40px;
      border: 1px solid var(--app-line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--app-ink);
      font: inherit;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
    }

    .topActions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      color: var(--app-muted);
      font-size: 15px;
    }

    .labShell {
      height: calc(900px - 72px);
      padding: 22px 56px 40px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 18px;
    }

    .stageRail {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stageButton {
      min-height: 56px;
      justify-content: flex-start;
      padding: 0 16px;
      font-size: 18px;
      background: rgba(255,253,248,0.92);
    }

    .stageButton.active {
      background: var(--app-green-soft);
      border-color: #9ab275;
    }

    .stepNote {
      margin-top: 8px;
      border: 1px solid var(--app-line);
      border-radius: 8px;
      background: rgba(255,253,248,0.9);
      padding: 16px;
    }

    .stepNote p {
      margin: 0;
      color: var(--app-muted);
      font-size: 15px;
      line-height: 1.44;
    }

    .stepNote strong {
      display: block;
      color: var(--app-green);
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .embeddedEditor {
      min-width: 0;
      display: grid;
      grid-template-rows: 52px 1fr;
      overflow: hidden;
      border: 1px solid var(--app-line);
      border-radius: 8px;
      background: var(--editor-bg);
      box-shadow: 0 20px 70px rgba(36,29,18,0.18);
    }

    .embedNotice {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 12px;
      border-bottom: 1px solid #2c3137;
      background: #1b2025;
      color: #f2f5f6;
    }

    .embedNotice div {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .embedNotice strong {
      white-space: nowrap;
    }

    .embedNotice span {
      color: #aeb6be;
      font-size: 14px;
    }

    .embedNotice button {
      min-height: 36px;
      border: 1px solid #3b4550;
      border-radius: 8px;
      background: #242b32;
      color: #f2f5f6;
      font: inherit;
      font-weight: 800;
      padding: 0 12px;
    }

    .velxio {
      min-height: 0;
      display: grid;
      grid-template-rows: 48px 1fr;
      background: var(--editor-bg);
      color: var(--editor-text);
    }

    .velxioToolbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border-bottom: 1px solid var(--editor-line);
      background: var(--editor-panel);
      overflow: hidden;
    }

    .tb {
      min-height: 32px;
      border: 1px solid #3a414b;
      border-radius: 5px;
      background: #252b32;
      color: #cbd5e1;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
    }

    .tb.active {
      background: var(--editor-blue);
      border-color: #229fe4;
      color: #fff;
    }

    .tb.run {
      color: #77df8c;
    }

    .tb.stop {
      color: #d95b5b;
    }

    .spacer {
      flex: 1;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 175px 390px 1fr;
    }

    .files {
      border-right: 1px solid var(--editor-line);
      background: #22272d;
      padding: 14px 10px;
      color: var(--editor-muted);
      font-size: 14px;
      font-weight: 800;
    }

    .fileHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .fileItem {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      border-radius: 5px;
      padding: 0 12px;
      color: #d1d8e0;
      font-weight: 750;
    }

    .fileItem.active {
      background: #203149;
    }

    .codePane {
      border-right: 1px solid var(--editor-line);
      background: #1f1f1f;
      padding: 18px 22px;
      color: #d8dee6;
      font: 18px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      overflow: hidden;
    }

    .codePane .comment {
      color: #6a9955;
    }

    .codePane .kw {
      color: #4fc1ff;
    }

    .codePane .fn {
      color: #dcdcaa;
    }

    .canvas {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        var(--editor-bg);
      background-size: 44px 44px;
    }

    .workspace.canvasOnly {
      grid-template-columns: 175px 1fr;
    }

    .workspace.canvasOnly .codePane {
      display: none;
    }

    .board {
      position: absolute;
      left: 175px;
      top: 260px;
      width: 305px;
      height: 220px;
      border: 3px solid #28aeea;
      border-radius: 9px;
      background: #2f87bd;
      box-shadow: 0 12px 24px rgba(0,0,0,0.24);
    }

    .board::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 62px;
      width: 88px;
      height: 62px;
      background: #c7c9c7;
      border: 3px solid #999;
    }

    .board::after {
      content: "UNO";
      position: absolute;
      left: 136px;
      top: 64px;
      color: #fff;
      font-size: 38px;
      border: 3px solid rgba(255,255,255,0.55);
      border-radius: 7px;
      padding: 2px 16px;
    }

    .chip {
      position: absolute;
      left: 118px;
      bottom: 48px;
      width: 145px;
      height: 48px;
      background: #1d2329;
      border: 2px solid #111;
      border-radius: 4px;
    }

    .pinRow {
      position: absolute;
      display: flex;
      gap: 7px;
    }

    .pinRow.top {
      top: 22px;
      right: 16px;
    }

    .pinRow.bottom {
      bottom: 16px;
      right: 20px;
    }

    .pin {
      width: 15px;
      height: 15px;
      border-radius: 3px;
      background: #8ee7f4;
      border: 2px solid #d5fbff;
    }

    .driver {
      position: absolute;
      left: 525px;
      top: 285px;
      width: 160px;
      height: 112px;
      border-radius: 7px;
      background: #d61f1f;
      color: #fff;
      box-shadow: 0 12px 24px rgba(0,0,0,0.24);
    }

    .driver::before {
      content: "";
      position: absolute;
      left: 52px;
      top: 33px;
      width: 57px;
      height: 46px;
      border-radius: 3px;
      background: repeating-linear-gradient(90deg, #e5eef1, #e5eef1 8px, #aeb9bf 8px, #aeb9bf 13px);
    }

    .driver::after {
      content: "L293D";
      position: absolute;
      left: 76px;
      top: 58px;
      font-size: 16px;
      font-weight: 900;
    }

    .motor {
      position: absolute;
      left: 720px;
      width: 120px;
      height: 58px;
      border-radius: 8px;
      background: #1b8a68;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(0,0,0,0.24);
    }

    .motor.left {
      top: 235px;
    }

    .motor.right {
      top: 410px;
    }

    .wire {
      position: absolute;
      height: 5px;
      border-radius: 4px;
      transform-origin: left center;
      background: var(--wire-green);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.28);
    }

    .red { background: var(--wire-red); }
    .black { background: var(--wire-black); }
    .yellow { background: var(--wire-yellow); }
    .orange { background: var(--wire-orange); }
    .blue { background: #2f80ed; }

    .scopeLabel {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: var(--wire-yellow);
      padding: 5px 10px;
      border-radius: 5px;
      font: 800 15px ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
    }

    .tutorialTag {
      position: absolute;
      left: 22px;
      top: 22px;
      max-width: 330px;
      border: 1px solid #3a414b;
      border-radius: 7px;
      background: rgba(32,37,43,0.92);
      color: #eef2f7;
      padding: 12px 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .tutorialTag strong {
      display: block;
      color: #d8ec9b;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .tutorialTag p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.38;
    }

    .checklist {
      position: absolute;
      left: 44px;
      top: 88px;
      width: 660px;
      display: grid;
      gap: 12px;
    }

    .check {
      min-height: 56px;
      border: 1px solid #3a414b;
      border-radius: 7px;
      background: rgba(32,37,43,0.94);
      color: #e7edf4;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 850;
    }

    .keyGrid {
      position: absolute;
      left: 80px;
      top: 125px;
      display: grid;
      grid-template-columns: repeat(3, 104px);
      grid-template-rows: repeat(3, 78px);
      gap: 14px;
      align-items: center;
      justify-items: center;
    }

    .key {
      width: 96px;
      height: 68px;
      border-radius: 8px;
      border: 2px solid #cfd8e3;
      background: #f8fafc;
      color: #1f2937;
      font-size: 30px;
      font-weight: 950;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 0 #cbd5e1;
    }

    .spaceKey {
      grid-column: 1 / 4;
      width: 318px;
      font-size: 22px;
    }

    .stateCard {
      position: absolute;
      right: 64px;
      top: 126px;
      width: 350px;
      border-radius: 8px;
      border: 1px solid #3a414b;
      background: rgba(32,37,43,0.95);
      color: #e7edf4;
      padding: 20px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
    }

    .stateCard code {
      display: block;
      margin-top: 14px;
      color: #d8ec9b;
      font: 16px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <template id="shell-template">
    <div class="topBar">
      <div class="brand"><span class="brandMark"></span>UBO Robotics</div>
      <nav class="nav">
        <button>Home</button>
        <button>Dashboard</button>
        <button>Lab</button>
      </nav>
      <div class="topActions"><span>Saved: tutorial run</span><button>Sign out</button></div>
    </div>
    <div class="labShell">
      <aside class="stageRail">
        <button class="stageButton active">Wiring lab</button>
        <button class="stageButton">Robot brain</button>
        <button class="stageButton">Test drive</button>
        <button class="stageButton">Race control</button>
        <div class="stepNote">
          <strong data-step>Step</strong>
          <p data-note>Build the circuit in the same editor surface used by the portal.</p>
        </div>
      </aside>
      <main class="embeddedEditor">
        <header class="embedNotice">
          <div><strong>Wiring simulator</strong><span>Velxio source editor embedded into the UBO lab.</span></div>
          <button>Open full window</button>
        </header>
        <section class="velxio">
          <div class="velxioToolbar">
            <span class="tb">Code</span>
            <span class="tb active">Both</span>
            <span class="tb">+ Circuit</span>
            <span class="tb">Wire</span>
            <span class="tb run">Run</span>
            <span class="tb stop">Stop</span>
            <span class="spacer"></span>
            <span class="tb">Arduino Uno</span>
            <span class="tb">Serial</span>
            <span class="tb">Scope</span>
            <span class="tb">100%</span>
            <span class="tb active">+ Add</span>
          </div>
          <div class="workspace">
            <aside class="files">
              <div class="fileHeader"><span>Workspace</span><span>+</span></div>
              <div class="fileItem active">Arduino Uno</div>
              <div class="fileItem">sketch.ino</div>
              <div class="fileItem">wiring.json</div>
            </aside>
            <pre class="codePane"><span class="comment">// UBO robot car</span>
<span class="kw">void</span> <span class="fn">setup</span>() {
  Serial.begin(115200);
  pinMode(LEFT_PWM, OUTPUT);
  pinMode(LEFT_FWD, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  driveForward(180);
  delay(1500);
  pivotRight(165);
  delay(900);
}</pre>
            <div class="canvas" data-canvas></div>
          </div>
        </section>
      </main>
    </div>
  </template>

  <section class="frame" id="open-editor" data-step="Step 1" data-note="Open the UBO wiring editor and stay inside the app shell.">
    <div data-shell></div>
  </section>

  <section class="frame" id="parts-layout" data-step="Step 2" data-note="Place the Uno, L293D, and motor loads in the same left-to-right flow as a bench setup.">
    <div data-shell></div>
  </section>

  <section class="frame" id="power-ground" data-step="Step 3" data-note="Power first: 5V to VCC1/VCC2 and shared GND to both L293D ground pins.">
    <div data-shell></div>
  </section>

  <section class="frame" id="direction-pwm" data-step="Step 4" data-note="Direction pins decide forward/reverse. PWM pins set speed.">
    <div data-shell></div>
  </section>

  <section class="frame" id="motor-outputs" data-step="Step 5" data-note="Motor loads connect to OUT1/OUT2 and OUT3/OUT4. The controller never powers motors directly.">
    <div data-shell></div>
  </section>

  <section class="frame" id="firmware" data-step="Step 6" data-note="Paste firmware and verify the serial state names before trusting movement.">
    <div data-shell></div>
  </section>

  <section class="frame" id="run-checklist" data-step="Step 7" data-note="Run the simulation and compare serial output to motor-driver state.">
    <div data-shell></div>
  </section>

  <section class="frame" id="game-controls" data-step="Step 8" data-note="Map W/A/S/D/Space to the same motor helper functions the firmware uses.">
    <div data-shell></div>
  </section>

  <script>
    const template = document.querySelector('#shell-template');
    const frames = Array.from(document.querySelectorAll('.frame'));

    function addPins(board) {
      const top = document.createElement('div');
      top.className = 'pinRow top';
      const bottom = document.createElement('div');
      bottom.className = 'pinRow bottom';
      for (let i = 0; i < 10; i += 1) top.append(Object.assign(document.createElement('span'), { className: 'pin' }));
      for (let i = 0; i < 8; i += 1) bottom.append(Object.assign(document.createElement('span'), { className: 'pin' }));
      board.append(top, bottom);
    }

    function wire(canvas, className, left, top, width, rotate) {
      const el = document.createElement('div');
      el.className = `wire ${className}`;
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      el.style.width = `${width}px`;
      el.style.transform = `rotate(${rotate}deg)`;
      canvas.append(el);
    }

    function label(canvas, text, left, top) {
      const el = document.createElement('div');
      el.className = 'scopeLabel';
      el.textContent = text;
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      canvas.append(el);
    }

    function tag(canvas, step, text) {
      const el = document.createElement('div');
      el.className = 'tutorialTag';
      el.innerHTML = `<strong>${step}</strong><p>${text}</p>`;
      canvas.append(el);
    }

    function addCircuit(frame, mode) {
      const canvas = frame.querySelector('[data-canvas]');
      const board = Object.assign(document.createElement('div'), { className: 'board' });
      const chip = Object.assign(document.createElement('div'), { className: 'chip' });
      board.append(chip);
      addPins(board);
      canvas.append(board);

      if (mode !== 'open-editor') {
        canvas.append(Object.assign(document.createElement('div'), { className: 'driver' }));
      }

      if (['parts-layout', 'motor-outputs', 'run-checklist', 'game-controls'].includes(mode)) {
        canvas.append(Object.assign(document.createElement('div'), { className: 'motor left', textContent: 'Left motor' }));
        canvas.append(Object.assign(document.createElement('div'), { className: 'motor right', textContent: 'Right motor' }));
      }

      if (mode === 'open-editor') {
        tag(canvas, 'Editor ready', 'Use this embedded editor as the wiring lab. The lesson should look like the real portal, not a separate slide deck.');
        label(canvas, 'DC SPICE 3 nets | 0 ms', 350, 210);
      }

      if (mode === 'parts-layout') {
        tag(canvas, 'Parts', 'Uno on the left, L293D in the middle, motor loads on the right.');
        label(canvas, 'controller', 232, 500);
        label(canvas, 'dual H-bridge', 546, 416);
        label(canvas, 'motor loads', 700, 500);
      }

      if (mode === 'power-ground') {
        tag(canvas, 'Power and ground', 'Wire logic power, motor power, and common ground before adding signal wires.');
        wire(canvas, 'red', 430, 430, 178, -38);
        wire(canvas, 'red', 430, 444, 218, -24);
        wire(canvas, 'black', 430, 462, 205, -10);
        wire(canvas, 'black', 430, 476, 228, 4);
        label(canvas, '5V -> VCC1 / VCC2', 520, 180);
        label(canvas, 'GND -> GND.1 / GND.2', 510, 520);
      }

      if (mode === 'direction-pwm') {
        tag(canvas, 'Direction and PWM', 'D5/D6 are speed. D8/D7 and D12/D11 are direction.');
        wire(canvas, 'yellow', 452, 295, 112, 0);
        wire(canvas, 'green', 452, 312, 112, 7);
        wire(canvas, 'red', 452, 329, 116, 14);
        wire(canvas, 'yellow', 452, 360, 120, 11);
        wire(canvas, 'green', 452, 378, 126, 17);
        wire(canvas, 'orange', 452, 395, 132, 23);
        label(canvas, 'speed: D5 / D6', 544, 220);
        label(canvas, 'direction: D8/D7 and D12/D11', 532, 465);
      }

      if (mode === 'motor-outputs') {
        tag(canvas, 'Motor outputs', 'OUT pins go to the motor loads. If one side runs backward, swap the output pair or invert code.');
        wire(canvas, 'black', 680, 318, 74, -30);
        wire(canvas, 'black', 680, 342, 78, -14);
        wire(canvas, 'black', 680, 366, 94, 38);
        wire(canvas, 'black', 680, 388, 94, 52);
        label(canvas, 'driver owns motor current', 630, 170);
      }

      if (mode === 'run-checklist') {
        tag(canvas, 'Run check', 'Serial text, pin states, and visible circuit behavior should agree.');
        const checks = [
          'Serial says forward; both sides drive forward.',
          'pivot-right; left forward and right reverse.',
          'pivot-left; left reverse and right forward.',
          'reverse; both sides reverse.',
          'stop; PWM is zero and direction pins are LOW.'
        ];
        const list = Object.assign(document.createElement('div'), { className: 'checklist' });
        checks.forEach((item, index) => {
          const row = Object.assign(document.createElement('div'), { className: 'check', textContent: `${index + 1}. ${item}` });
          list.append(row);
        });
        canvas.append(list);
      }

      if (mode === 'game-controls') {
        tag(canvas, 'Driving controls', 'The game should consume the same motor state produced by firmware helper functions.');
        const grid = Object.assign(document.createElement('div'), { className: 'keyGrid' });
        grid.innerHTML = '<div></div><div class="key">W</div><div></div><div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key spaceKey">Space</div>';
        canvas.append(grid);
        const card = Object.assign(document.createElement('div'), { className: 'stateCard' });
        card.innerHTML = '<strong>Example state from D</strong><code>{\\n  leftMotor: "forward",\\n  rightMotor: "reverse",\\n  leftSpeed: 165,\\n  rightSpeed: 165,\\n  action: "pivot-right"\\n}</code>';
        canvas.append(card);
      }
    }

    frames.forEach((frame) => {
      const host = frame.querySelector('[data-shell]');
      host.replaceWith(template.content.cloneNode(true));
      frame.querySelector('[data-step]').textContent = frame.dataset.step;
      frame.querySelector('[data-note]').textContent = frame.dataset.note;

      if (frame.id === 'firmware') {
        frame.querySelector('.workspace').classList.remove('canvasOnly');
        frame.querySelector('.codePane').innerHTML = `<span class="comment">// robot_car_drive.ino</span>
<span class="kw">void</span> <span class="fn">driveForward</span>(int speed) {
  setLeftMotor(true, speed);
  setRightMotor(true, speed);
  logState("forward", speed, speed);
}

<span class="kw">void</span> <span class="fn">pivotRight</span>(int speed) {
  setLeftMotor(true, speed);
  setRightMotor(false, speed);
  logState("pivot-right", speed, speed);
}

<span class="kw">void</span> <span class="fn">stopRobot</span>() {
  digitalWrite(LEFT_FWD, LOW);
  digitalWrite(LEFT_REV, LOW);
  analogWrite(LEFT_PWM, 0);
}`;
        tag(frame.querySelector('[data-canvas]'), 'Firmware', 'Paste the helper functions, then verify serial output before racing.');
      } else {
        frame.querySelector('.workspace').classList.add('canvasOnly');
        addCircuit(frame, frame.id);
      }
    });

    function showHashFrame() {
      const id = window.location.hash.slice(1);
      if (!id) return;
      frames.forEach((frame) => {
        frame.style.display = frame.id === id ? 'block' : 'none';
      });
    }

    showHashFrame();
    window.addEventListener('hashchange', showHashFrame);
  </script>
</body>
</html>
